    <style>

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #010101; --accent: #00ffaa; --gold: #ffcc00; --danger: #ff4757; --blue: #00d4ff; --purple: #aa66ff; --orange: #ff884d; --border: rgba(0, 255, 170, 0.2); --silver-bright: #e0e0e0; --silver-medium: #c0c0c0; --silver-dark: #a9a9a9; --gold-dim: rgba(255, 204, 0, 0.12); --card-bg: #050505; }

<script>
    // ==================== KONFIGURASI ====================
    let currentPair = localStorage.getItem('lastPair') || "XAUUSDT";
    let currentTF = localStorage.getItem('lastTF') || "15m";
    let wsPrice = null;
    let lastPrice = 0;
    let candleData = [];
    
    // Engine state
    let engine = { 
        f618: 0, ote: 0, deep: 0, sl: 0, tp: 0, range: 0, bias: "SCANNING",
        swingHigh: 0, swingLow: 0,
        lastSwingHigh: 0, lastSwingLow: 0,
        sweepDetected: false, bosConfirmed: false, liquiditySide: null,
        adx: 25, ema34: 0, isTrending: false,
        lastSweepTime: 0, lastBosTime: 0,
        lastTPHitTime: 0
    };
    
    // ==================== FUNGSI UTAMA ====================
    function getPrecision() {
        return currentPair === "XAUUSDT" ? 2 : 1;
    }
    
    // ==================== RSI SAMA DENGAN MT5 ====================
    function computeRSI(currentPrice) {
        // Minimal data: 14 periode + 1 untuk perhitungan
        if (!candleData.length || candleData.length < 15) return 50;
        
        const period = 14;
        
        // Ambil data close dari candle LENGKAP (bukan tick)
        // Ini yang membuat RSI sama dengan MT5
        let closes = [];
        
        // Gunakan 20 candle terakhir untuk perhitungan yang akurat
        const candleCount = Math.min(candleData.length, period + 6);
        for (let i = candleData.length - candleCount; i < candleData.length; i++) {
            closes.push(candleData[i].c);
        }
        
        // Tambahkan harga tick terbaru sebagai data terakhir
        // TAPI jangan mengganti close candle yang sudah final
        if (closes.length > 0 && currentPrice !== closes[closes.length - 1]) {
            closes.push(currentPrice);
        }
        
        if (closes.length < period + 1) return 50;
        
        // Hitung gain dan loss awal
        let gains = 0;
        let losses = 0;
        
        // Hitung perubahan harga untuk periode awal
        for (let i = closes.length - period; i < closes.length; i++) {
            if (i > 0) {
                const diff = closes[i] - closes[i - 1];
                if (diff >= 0) {
                    gains += diff;
                } else {
                    losses += Math.abs(diff);
                }
            }
        }
        
        // Rata-rata gain dan loss
        let avgGain = gains / period;
        let avgLoss = losses / period;
        
        // Wilder's Smoothing untuk RSI (sama dengan MT5)
        // Mulai dari index setelah periode awal
        for (let i = closes.length - period + 1; i < closes.length; i++) {
            if (i > 0) {
                const diff = closes[i] - closes[i - 1];
                if (diff >= 0) {
                    avgGain = ((avgGain * (period - 1)) + diff) / period;
                    avgLoss = (avgLoss * (period - 1)) / period;
                } else {
                    avgGain = (avgGain * (period - 1)) / period;
                    avgLoss = ((avgLoss * (period - 1)) + Math.abs(diff)) / period;
                }
            }
        }
        
        // RS dan RSI
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        let rsi = 100 - (100 / (1 + rs));
        
        // Batasi nilai RSI antara 0 dan 100
        rsi = Math.min(100, Math.max(0, rsi));
        
        return rsi;
    }
    
    // ==================== ADX REAL-TIME ====================
    function calculateADXWithTick(currentPrice) {
        if (!candleData.length || candleData.length < 28) return 25;
        
        try {
            const period = 14;
            const data = candleData.slice(-(period * 2));
            if (data.length < period + 1) return 25;
            
            let tr = [], plusDM = [], minusDM = [];
            
            for (let i = 1; i < data.length; i++) {
                const high = data[i].h, low = data[i].l, prevHigh = data[i-1].h, prevLow = data[i-1].l, prevClose = data[i-1].c;
                tr.push(Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose)));
                const upMove = high - prevHigh, downMove = prevLow - low;
                if (upMove > downMove && upMove > 0) { plusDM.push(upMove); minusDM.push(0); }
                else if (downMove > upMove && downMove > 0) { plusDM.push(0); minusDM.push(downMove); }
                else { plusDM.push(0); minusDM.push(0); }
            }
            
            const lastCandle = data[data.length - 1];
            const currentHigh = Math.max(lastCandle.h, currentPrice);
            const currentLow = Math.min(lastCandle.l, currentPrice);
            const prevClose = lastCandle.c;
            
            const tickTR = Math.max(currentHigh - currentLow, Math.abs(currentHigh - prevClose), Math.abs(currentLow - prevClose));
            tr.push(tickTR);
            
            const tickUpMove = currentHigh - lastCandle.h;
            const tickDownMove = lastCandle.l - currentLow;
            
            if (tickUpMove > tickDownMove && tickUpMove > 0) {
                plusDM.push(tickUpMove);
                minusDM.push(0);
            } else if (tickDownMove > tickUpMove && tickDownMove > 0) {
                plusDM.push(0);
                minusDM.push(tickDownMove);
            } else {
                plusDM.push(0);
                minusDM.push(0);
            }
            
            if (tr.length < period) return 25;
            
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            smoothedTR /= period; smoothedPlusDM /= period; smoothedMinusDM /= period;
            
            const plusDI = (smoothedPlusDM / smoothedTR) * 100;
            const minusDI = (smoothedMinusDM / smoothedTR) * 100;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            
            return Math.min(100, Math.max(0, isNaN(dx) ? 25 : dx));
        } catch (error) { return 25; }
    }
    
    function calculateADX() {
        if (lastPrice > 0) return calculateADXWithTick(lastPrice);
        if (!candleData.length || candleData.length < 28) return 25;
        try {
            const period = 14;
            const data = candleData.slice(-(period * 2));
            if (data.length < period + 1) return 25;
            let tr = [], plusDM = [], minusDM = [];
            for (let i = 1; i < data.length; i++) {
                const high = data[i].h, low = data[i].l, prevHigh = data[i-1].h, prevLow = data[i-1].l, prevClose = data[i-1].c;
                tr.push(Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose)));
                const upMove = high - prevHigh, downMove = prevLow - low;
                if (upMove > downMove && upMove > 0) { plusDM.push(upMove); minusDM.push(0); }
                else if (downMove > upMove && downMove > 0) { plusDM.push(0); minusDM.push(downMove); }
                else { plusDM.push(0); minusDM.push(0); }
            }
            if (tr.length < period) return 25;
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            smoothedTR /= period; smoothedPlusDM /= period; smoothedMinusDM /= period;
            const plusDI = (smoothedPlusDM / smoothedTR) * 100;
            const minusDI = (smoothedMinusDM / smoothedTR) * 100;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            return Math.min(100, Math.max(0, isNaN(dx) ? 25 : dx));
        } catch (error) { return 25; }
    }
    
    // EMA34
    function calculateEMA34() {
        if (!candleData.length || candleData.length < 34) return null;
        const period = 34, multiplier = 2 / (period + 1);
        let ema = candleData[0].c;
        for (let i = 1; i < candleData.length; i++) ema = (candleData[i].c - ema) * multiplier + ema;
        return ema;
    }
    
    // ==================== AUTO RESET TP HIT ====================
    function checkTPHit(currentPrice) {
        if (engine.tp === 0) return false;
        const isBullish = engine.bias.includes("BULL");
        let tpHit = false;
        if (isBullish && currentPrice >= engine.tp) tpHit = true;
        else if (!isBullish && currentPrice <= engine.tp) tpHit = true;
        
        if (tpHit && (Date.now() - engine.lastTPHitTime) > 10000) {
            engine.lastTPHitTime = Date.now();
            engine.sweepDetected = false;
            engine.bosConfirmed = false;
            engine.liquiditySide = null;
            updateLiquidityUI("RESET", null);
            forceRecalculateStructure();
            showAlert("✅ TP TARGET HIT! Structure recalculated", "tp");
            return true;
        }
        return false;
    }
    
    function forceRecalculateStructure() {
        if (!candleData.length || candleData.length < 30) return;
        const lookback = currentTF === "5m" ? 40 : (currentTF === "15m" ? 50 : 80);
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        const newSwingHigh = Math.max(...slice.map(c => c.h));
        const newSwingLow = Math.min(...slice.map(c => c.l));
        engine.swingHigh = newSwingHigh;
        engine.swingLow = newSwingLow;
        engine.lastSwingHigh = newSwingHigh;
        engine.lastSwingLow = newSwingLow;
        const lastCandle = candleData[candleData.length - 1];
        engine.bias = lastCandle.c > (newSwingHigh + newSwingLow) / 2 ? "BULLISH" : "BEARISH";
        calculateSMCLevels();
        if (lastPrice > 0) updateUI(lastPrice);
    }
    
    // DETECT LIQUIDITY SWEEP
    function detectLiquiditySweep(price) {
        if (!engine.swingHigh || !engine.swingLow) return false;
        const buffer = currentPair === "XAUUSDT" ? 0.5 : 50;
        const now = Date.now();
        if (price > engine.swingHigh + buffer && !engine.sweepDetected && now - engine.lastSweepTime > 8000) {
            engine.sweepDetected = true;
            engine.liquiditySide = "SELL";
            engine.lastSweepTime = now;
            engine.bosConfirmed = false;
            updateLiquidityUI("SWEEP", "SELL");
            showAlert("🔥 LIQUIDITY SWEEP | HIGH TAKEN", "sweep");
            return true;
        } else if (price < engine.swingLow - buffer && !engine.sweepDetected && now - engine.lastSweepTime > 8000) {
            engine.sweepDetected = true;
            engine.liquiditySide = "BUY";
            engine.lastSweepTime = now;
            engine.bosConfirmed = false;
            updateLiquidityUI("SWEEP", "BUY");
            showAlert("🔥 LIQUIDITY SWEEP | LOW TAKEN", "sweep");
            return true;
        }
        return false;
    }
    
    function confirmBOS(currentPrice) {
        if (!engine.sweepDetected || engine.bosConfirmed) return false;
        const now = Date.now();
        if (engine.liquiditySide === "BUY" && currentPrice > engine.swingHigh) {
            engine.bosConfirmed = true;
            engine.bias = "BULLISH_BOS";
            engine.lastBosTime = now;
            updateLiquidityUI("BOS", "BULLISH");
            showAlert("✅ BOS CONFIRMED | BULLISH", "bos");
            highlightFVGEntry();
            return true;
        } else if (engine.liquiditySide === "SELL" && currentPrice < engine.swingLow) {
            engine.bosConfirmed = true;
            engine.bias = "BEARISH_BOS";
            engine.lastBosTime = now;
            updateLiquidityUI("BOS", "BEARISH");
            showAlert("✅ BOS CONFIRMED | BEARISH", "bos");
            highlightFVGEntry();
            return true;
        }
        return false;
    }
    
    function resetSweepIfStructureChanged() {
        if (engine.swingHigh !== engine.lastSwingHigh || engine.swingLow !== engine.lastSwingLow) {
            if (engine.sweepDetected && !engine.bosConfirmed) {
                engine.sweepDetected = false;
                engine.liquiditySide = null;
                updateLiquidityUI("RESET", null);
            }
            engine.lastSwingHigh = engine.swingHigh;
            engine.lastSwingLow = engine.swingLow;
        }
    }
    
    function updateLiquidityUI(status, side) {
        const elem = document.getElementById('liquidity-status');
        if (status === "SWEEP") {
            elem.innerHTML = side === "BUY" ? "🔥 SWEEP DETECTED | BEAR TRAP" : "🔥 SWEEP DETECTED | BULL TRAP";
            elem.className = "liquidity-status sweep";
        } else if (status === "BOS") {
            elem.innerHTML = side === "BULLISH" ? "✅ BOS CONFIRMED | BULLISH" : "✅ BOS CONFIRMED | BEARISH";
            elem.className = "liquidity-status bos";
        } else {
            elem.innerHTML = "⚡ AWAITING SWEEP";
            elem.className = "liquidity-status";
        }
    }
    
    function updateADXUI(adxValue) {
        const adxElem = document.getElementById('adx-status');
        const adxValueElem = document.getElementById('adx-value');
        const adxBar = document.getElementById('adx-bar');
        const adxRec = document.getElementById('adx-recommendation');
        
        adxValueElem.innerText = adxValue.toFixed(1);
        adxBar.style.width = Math.min(100, (adxValue / 60) * 100) + "%";
        
        let statusClass = "", recText = "", barColor = "";
        
        if (adxValue < 20) {
            statusClass = "ranging";
            barColor = "var(--silver-dark)";
            recText = "⚠️ RANGING MARKET (ADX < 20) - Hindari entry baru, tunggu trend.";
        } else if (adxValue < 25) {
            statusClass = "weak";
            barColor = "var(--gold)";
            recText = "⚡ WEAK TREND (ADX 20-25) - Konfirmasi dengan struktur SMC.";
        } else if (adxValue < 40) {
            statusClass = "strong";
            barColor = "var(--accent)";
            recText = "✅ STRONG TREND (ADX > 25) - Ideal untuk entry setelah BOS.";
        } else {
            statusClass = "strong";
            barColor = "var(--accent)";
            recText = "🔥 VERY STRONG TREND (ADX > 40) - Momentum kuat, ikuti arah.";
        }
        
        adxElem.className = `adx-status ${statusClass}`;
        adxBar.style.background = barColor;
        adxRec.className = `adx-recommendation ${statusClass}`;
        adxRec.innerHTML = `📊 ADX: ${adxValue.toFixed(1)} - ${recText}`;
        engine.adx = adxValue;
    }
    
    function updateEMA34UI(currentPrice) {
        const emaValue = calculateEMA34();
        const emaElem = document.getElementById('ema34-value');
        const emaStatus = document.getElementById('ema34-status');
        
        if (emaValue !== null && !isNaN(emaValue)) {
            engine.ema34 = emaValue;
            const prec = getPrecision();
            emaElem.innerText = emaValue.toFixed(prec);
            if (currentPrice > emaValue) {
                emaStatus.className = "ema34-status bullish";
                emaElem.style.color = "var(--accent)";
            } else {
                emaStatus.className = "ema34-status bearish";
                emaElem.style.color = "var(--danger)";
            }
        } else {
            emaElem.innerText = "--";
            emaStatus.className = "ema34-status";
        }
    }
    
    function highlightFVGEntry() {
        ['r618', 'r705', 'r79'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('fvg-highlight');
                setTimeout(() => el.classList.remove('fvg-highlight'), 1500);
            }
        });
    }
    
    function calculateSMCLevels() {
        if (!candleData.length || candleData.length < 30) return;
        
        const lookback = currentTF === "5m" ? 40 : (currentTF === "15m" ? 50 : 80);
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        
        const swingHigh = Math.max(...slice.map(c => c.h));
        const swingLow = Math.min(...slice.map(c => c.l));
        const lastCandle = candleData[candleData.length - 1];
        const currentPrice = lastCandle.c;
        const range = swingHigh - swingLow;
        
        if (range <= 0) return;
        
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        resetSweepIfStructureChanged();
        
        if (!engine.bosConfirmed) {
            engine.bias = currentPrice > (swingHigh + swingLow) / 2 ? "BULLISH" : "BEARISH";
        }
        
        const isBullish = engine.bosConfirmed ? engine.bias === "BULLISH_BOS" : engine.bias === "BULLISH";
        
        if (isBullish) {
            engine.f618 = swingLow + (range * 0.618);
            engine.ote = swingLow + (range * 0.705);
            engine.deep = swingLow + (range * 0.79);
            engine.tp = swingHigh + (range * 0.23);
            const distToTP = Math.abs(engine.tp - engine.ote);
            engine.sl = engine.ote - (distToTP * 0.65);
        } else {
            engine.f618 = swingHigh - (range * 0.618);
            engine.ote = swingHigh - (range * 0.705);
            engine.deep = swingHigh - (range * 0.79);
            engine.tp = swingLow - (range * 0.23);
            const distToTP = Math.abs(engine.ote - engine.tp);
            engine.sl = engine.ote + (distToTP * 0.65);
        }
        
        engine.range = currentPair === "XAUUSDT" ? Math.abs(currentPrice - engine.tp) * 10 : Math.abs(currentPrice - engine.tp);
    }
    
    // ==================== MAIN UI UPDATE ====================
    function updateUI(currentPrice) {
        const prec = getPrecision();
        const priceElem = document.getElementById('live-price');
        
        const pFixed = currentPrice.toFixed(prec);
        const parts = pFixed.split('.');
        priceElem.innerHTML = `${parts[0]}<span class="price-decimal">.${parts[1] || "00"}</span>`;
        
        if (currentPrice > lastPrice && lastPrice !== 0) {
            priceElem.style.color = "var(--accent)";
        } else if (currentPrice < lastPrice && lastPrice !== 0) {
            priceElem.style.color = "var(--danger)";
        }
        priceElem.classList.add('price-flash');
        setTimeout(() => priceElem.classList.remove('price-flash'), 100);
        
        document.getElementById('r618').innerText = engine.f618.toFixed(prec);
        document.getElementById('r705').innerText = engine.ote.toFixed(prec);
        document.getElementById('r79').innerText = engine.deep.toFixed(prec);
        document.getElementById('rSL').innerText = engine.sl.toFixed(prec);
        document.getElementById('rTP').innerText = engine.tp.toFixed(prec);
        document.getElementById('rRange').innerText = engine.range.toFixed(1);
        
        // RSI - SEKARANG SAMA DENGAN MT5
        const rsi = computeRSI(currentPrice);
        document.getElementById('rsi-val').innerText = rsi.toFixed(2);
        document.getElementById('rsi-bar').style.width = rsi + "%";
        document.getElementById('rsi-bar').style.background = rsi > 70 ? "var(--danger)" : (rsi < 30 ? "var(--accent)" : "var(--silver-medium)");
        
        // ADX REAL-TIME
        const adx = calculateADXWithTick(currentPrice);
        updateADXUI(adx);
        
        updateEMA34UI(currentPrice);
        
        // ADX FILTER
        const biasDisplay = document.getElementById('pattern-val');
        if (adx < 20) {
            biasDisplay.innerHTML = `⚠️ RANGING (ADX ${adx.toFixed(1)})`;
            biasDisplay.style.color = "var(--silver-dark)";
        } else {
            biasDisplay.innerHTML = engine.bias.replace('_', ' ');
            biasDisplay.style.color = engine.bias.includes("BULL") ? "var(--accent)" : "var(--danger)";
        }
        
        // Status header
        const sysDiv = document.getElementById('sys-status');
        if (engine.bosConfirmed) {
            sysDiv.innerHTML = `BOS✓ ${engine.bias.includes("BULL") ? "BULL" : "BEAR"}`;
            sysDiv.style.color = engine.bias.includes("BULL") ? "var(--accent)" : "var(--danger)";
        } else if (engine.sweepDetected) {
            sysDiv.innerHTML = "SWEEP ◆";
            sysDiv.style.color = "var(--orange)";
        } else {
            sysDiv.innerHTML = "「•」";
            sysDiv.style.color = "var(--gold)";
        }
        
        checkTPHit(currentPrice);
        
        lastPrice = currentPrice;
    }
    
    // ==================== DATA FETCHING ====================
    async function fetchKlines() {
        try {
            const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${currentTF}&limit=120`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            candleData = data.map(d => ({
                o: parseFloat(d[1]), h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4]), t: d[0], v: parseFloat(d[5])
            }));
            
            calculateSMCLevels();
            if (candleData.length) updateUI(candleData[candleData.length - 1].c);
            return true;
        } catch (err) { return false; }
    }
    
    function initWebSocket() {
        if (wsPrice) wsPrice.close();
        wsPrice = new WebSocket(`wss://fstream.binance.com/ws/${currentPair.toLowerCase()}@aggTrade`);
        wsPrice.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.p) {
                    const tradePrice = parseFloat(msg.p);
                    calculateSMCLevels();
                    detectLiquiditySweep(tradePrice);
                    confirmBOS(tradePrice);
                    updateUI(tradePrice);
                }
            } catch (err) {}
        };
    }
    
    function showAlert(message, type) {
        const toast = document.getElementById('toastCopy');
        toast.innerText = message;
        toast.style.borderColor = type === "sweep" ? "var(--orange)" : (type === "tp" ? "var(--blue)" : "var(--accent)");
        toast.style.color = type === "sweep" ? "var(--orange)" : (type === "tp" ? "var(--blue)" : "var(--accent)");
        toast.style.opacity = "1";
        setTimeout(() => {
            toast.style.opacity = "0";
            toast.style.borderColor = "var(--accent)";
            toast.style.color = "var(--accent)";
        }, 2500);
    }
    
    function showToastMsg(msg) {
        const toast = document.getElementById('toastCopy');
        toast.innerText = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 1500);
    }
    
    window.smartCopy = function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        navigator.clipboard.writeText(el.innerText);
        showToastMsg(`✓ Copied: ${el.innerText}`);
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 300);
    };
    
    function updateClockAndSession() {
        const now = new Date();
        const hours = now.getHours();
        document.getElementById('clock-module').innerText = now.toLocaleTimeString('id-ID');
        document.getElementById('date-display').innerText = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
        let session = "NY_VOL";
        if (hours >= 7 && hours < 14) session = "ASIA";
        else if (hours >= 14 && hours < 20) session = "LONDON";
        document.getElementById('session-tag').innerText = session;
    }
    
    async function fullReload() {
        document.getElementById('main-terminal').classList.add('syncing');
        engine.sweepDetected = false;
        engine.bosConfirmed = false;
        engine.liquiditySide = null;
        updateLiquidityUI("RESET", null);
        await fetchKlines();
        initWebSocket();
        document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${currentPair}`)?.classList.add('active');
        document.getElementById(`tf-${currentTF}`)?.classList.add('active');
        setTimeout(() => document.getElementById('main-terminal').classList.remove('syncing'), 500);
    }
    
    // EVENT LISTENERS
    document.querySelectorAll('[data-pair]').forEach(btn => {
        btn.onclick = () => { currentPair = btn.dataset.pair; localStorage.setItem('lastPair', currentPair); fullReload(); };
    });
    document.querySelectorAll('[data-tf]').forEach(btn => {
        btn.onclick = () => { currentTF = btn.dataset.tf; localStorage.setItem('lastTF', currentTF); fullReload(); };
    });
    
    setInterval(updateClockAndSession, 1000);
    setInterval(() => {
        if (lastPrice > 0) {
            calculateSMCLevels();
            updateUI(lastPrice);
        }
    }, 4000);
    
    fullReload();
</script>
