<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMC APEX v15.5.0 | URTRADER TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg: #010101; --accent: #00ffaa; --gold: #ffcc00; --danger: #ff4757; --blue: #00d4ff; 
            --purple: #aa66ff; --orange: #ff884d; --border: rgba(0, 255, 170, 0.2); 
            --silver-bright: #e0e0e0; --silver-medium: #c0c0c0; --silver-dark: #a9a9a9; 
            --gold-dim: rgba(255, 204, 0, 0.12); --card-bg: #050505;
            --highlight-bull: #00cc88; --highlight-bear: #ff8866; --highlight-neutral: #aaaaaa;
        }
        
        body { 
            font-family: 'Space Grotesk', sans-serif; background: #000; color: var(--silver-bright); 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
            position: fixed; top: 0; left: 0; 
        }
        
        .app-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .terminal-container { width: 100%; background: var(--bg); position: relative; z-index: 10; flex-shrink: 0; }
        
        .header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; flex-wrap: wrap; gap: 10px; }
        .brand-container { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .brand { font-weight: 900; font-size: 0.85rem; letter-spacing: 2px; color: var(--accent); text-align: left; }
        .meta-label-sub { font-size: 0.55rem; color: var(--silver-dark); letter-spacing: 3px; font-family: 'JetBrains Mono'; font-weight: 800; text-align: left; }
        
        #sys-status { 
            font-family: 'JetBrains Mono'; 
            font-size: 0.65rem; 
            font-weight: 800; 
            border-left: 2px solid var(--gold); 
            padding-left: 8px; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .ws-status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .ws-status-dot.live { 
            background: var(--accent); 
            box-shadow: 0 0 8px var(--accent);
            animation: pulseLive 1s ease infinite;
        }
        .ws-status-dot.reconnect { 
            background: var(--orange); 
            animation: pulseReconnect 0.8s ease infinite;
        }
        .ws-status-dot.offline { 
            background: var(--danger); 
            animation: none;
            box-shadow: none;
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--accent); }
            50% { opacity: 0.6; transform: scale(0.9); box-shadow: 0 0 4px var(--accent); }
        }
        @keyframes pulseReconnect {
            0%, 100% { opacity: 1; transform: scale(1); background: var(--orange); }
            50% { opacity: 0.5; transform: scale(0.85); background: #ffaa66; }
        }
        
        .nav-section { display: flex; gap: 12px; padding: 12px 16px; justify-content: space-between; flex-wrap: wrap; background: #000; align-items: center; }
        .nav-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-tab { 
            background: transparent;
            border: none;
            color: var(--silver-dark); 
            padding: 7px 14px; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            cursor: pointer; 
            font-family: 'JetBrains Mono'; 
            transition: 0.2s; 
            letter-spacing: 0.3px;
        }
        .btn-tab.active { 
            color: var(--accent); 
            background: rgba(0, 255, 170, 0.08); 
            box-shadow: 0 0 8px rgba(0, 255, 170, 0.25);
        }
        .btn-tab.disabled { 
            opacity: 0.5; 
            cursor: wait; 
            pointer-events: none; 
        }
        .btn-tab:hover:not(.disabled) {
            color: var(--accent);
            background: rgba(0, 255, 170, 0.05);
        }
        
        .hero-display { padding: 8px 20px 20px; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; width: 100%; }
        
        .hero-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            align-items: center;
        }
        
        .adx-status {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--gold-dim);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .adx-bar-container { width: 45px; height: 4px; background: #2a2a2a; border-radius: 4px; overflow: hidden; display: inline-block; }
        .adx-bar { height: 100%; width: 0%; background: var(--silver-medium); transition: width 0.3s ease, background 0.3s ease; border-radius: 4px; }
        .adx-value { font-weight: 800; min-width: 38px; text-align: right; }
        .adx-status.strong { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 170, 0.1); }
        .adx-status.weak { border-color: var(--gold); color: var(--gold); background: rgba(255, 204, 0, 0.1); }
        .adx-status.ranging { border-color: var(--silver-dark); color: var(--silver-dark); }
        
        .ema34-status {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--gold-dim);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .ema34-value { font-weight: 800; min-width: 65px; text-align: right; }
        .ema34-status.bullish { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 170, 0.1); }
        .ema34-status.bearish { border-color: var(--danger); color: var(--danger); background: rgba(255, 71, 87, 0.1); }
        
        .swing-high, .swing-low {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--gold-dim);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .swing-high:hover, .swing-low:hover {
            background: rgba(0, 255, 170, 0.1);
            border-color: var(--accent);
        }
        .swing-high span:first-child, .swing-low span:first-child { color: var(--silver-dark); }
        .swing-high-value, .swing-low-value { color: var(--silver-bright); font-weight: 800; }
        
        .meta-fvg, .meta-bias {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--gold-dim);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        #pattern-val { font-weight: 800; transition: all 0.2s; }
        
        .rsi-panel {
            margin-top: 16px;
            margin-bottom: 12px;
            padding: 10px 14px;
            border: 1px solid var(--gold-dim);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            text-align: left;
            width: 100%;
        }
        .rsi-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .rsi-tag {
            font-size: 0.55rem;
            font-weight: 900;
            color: var(--silver-dark);
            font-family: 'JetBrains Mono';
            letter-spacing: 1px;
        }
        #rsi-val {
            font-family: 'JetBrains Mono';
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--silver-bright);
        }
        .rsi-track {
            height: 3px;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }
        #rsi-bar {
            height: 100%;
            width: 0%;
            background: var(--silver-medium);
            transition: width 0.2s ease, background 0.2s;
        }
        
        .mtf-paragraph-card {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 8px 12px;
            margin: 0 0 10px 0;
            border: 1px solid rgba(255, 204, 0, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mtf-paragraph-card:hover {
            background: rgba(0,0,0,0.6);
            border-color: var(--accent);
        }
        .mtf-paragraph-text {
            font-family: 'JetBrains Mono';
            font-size: 0.65rem;
            line-height: 1.4;
            letter-spacing: 0.2px;
            color: var(--silver-bright);
        }
        .mtf-highlight {
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 8px;
            display: inline-block;
            background: rgba(0, 255, 170, 0.12);
            color: var(--accent);
        }
        .mtf-highlight-bull {
            background: rgba(0, 204, 136, 0.15);
            color: #00cc88;
        }
        .mtf-highlight-bear {
            background: rgba(255, 136, 102, 0.15);
            color: #ff8866;
        }
        .mtf-highlight-neutral {
            background: rgba(170, 170, 170, 0.15);
            color: #cccccc;
        }
        
        .orderblock-status {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.55rem;
            font-family: 'JetBrains Mono';
            border-left: 2px solid var(--purple);
            transition: all 0.2s ease;
        }
        .ob-bullish { border-left-color: var(--accent); color: var(--accent); background: rgba(0, 255, 170, 0.05); }
        .ob-bearish { border-left-color: var(--danger); color: var(--danger); background: rgba(255, 71, 87, 0.05); }
        
        @media (max-width: 700px) {
            .hero-meta-row { gap: 8px; }
            .adx-status, .ema34-status, .swing-high, .swing-low, .meta-fvg, .meta-bias {
                font-size: 0.55rem;
                padding: 3px 10px;
            }
            .mtf-paragraph-text { font-size: 0.55rem; }
        }
        
        #live-price { font-family: 'JetBrains Mono'; font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; color: #fff; line-height: 1; cursor: pointer; transition: color 0.08s linear; word-break: break-word; text-align: left; width: 100%; margin-top: 4px; }
        .price-decimal { color: var(--accent); opacity: 0.7; font-size: 2.2rem; }
        
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; background: #0b0b0b; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 12px; }
        .data-item { background: var(--bg); padding: 10px 4px; text-align: left; padding-left: 12px; border-right: 1px solid rgba(255,255,255,0.03); transition: background 0.1s; cursor: pointer; }
        .data-item:last-child { border-right: none; }
        .data-label { font-size: 0.45rem; color: var(--silver-medium); text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: 700; letter-spacing: 0.8px; text-align: left; }
        .data-val { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: #fff; font-weight: 800; text-align: left; line-height: 1.2; }
        .entry-gold { color: var(--gold) !important; text-shadow: 0 0 4px rgba(255, 204, 0, 0.5); }
        .fvg-highlight { animation: fvgPulse 0.8s ease 2; text-shadow: 0 0 8px var(--accent); }
        @keyframes fvgPulse { 0% { text-shadow: 0 0 0 var(--accent); } 100% { text-shadow: 0 0 12px var(--accent); } }
        
        .terminal-box { padding: 0 16px 14px 16px; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid #151515; border-radius: 12px; padding: 12px; backdrop-filter: blur(2px); }
        
        .footer-info { 
            padding: 8px 0 0 0;
            background: transparent; 
            border-radius: 12px; 
            display: flex; 
            justify-content: flex-start;
            align-items: center; 
            flex-wrap: wrap; 
            gap: 10px;
            margin-top: 8px;
        }
        .session-module-new, .date-module-new, .clock-module-new {
            font-weight: 800;
            background: #080808;
            padding: 4px 12px;
            border-radius: 16px;
            letter-spacing: 1px;
            font-size: 0.55rem;
            font-family: 'JetBrains Mono';
            border: 1px solid #1f1f1f;
        }
        .session-module-new { color: var(--gold); }
        .date-module-new { color: var(--silver-bright); }
        .clock-module-new { color: #fff; background: #000; border-color: var(--accent); }
        
        .footer { display: none; }
        
        .syncing { opacity: 0.6; transition: opacity 0.2s; pointer-events: none; }
        .syncing * { pointer-events: none; }
        .copied { color: #fff !important; text-shadow: 0 0 8px var(--accent); transition: 0.1s; }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <div class="terminal-container" id="main-terminal">
        <header class="header">
            <div class="brand-container">
                <div class="brand">SMC_APEX v15.5.0</div>
                <div class="meta-label-sub">URTRADER TERMINAL</div>
            </div>
            <div id="sys-status">
                <span class="ws-status-dot" id="ws-status-dot"></span>
                <span id="ws-status-text">INITIALIZING</span>
            </div>
        </header>

        <nav class="nav-section">
            <div class="nav-group">
                <button class="btn-tab" data-pair="XAUUSDT" id="btn-XAUUSDT">XAUUSD</button>
                <button class="btn-tab" data-pair="BTCUSDT" id="btn-BTCUSDT">BTCUSD</button>
            </div>
            <div class="nav-group">
                <button class="btn-tab" data-tf="5m" id="tf-5m">M5</button>
                <button class="btn-tab" data-tf="15m" id="tf-15m">M15</button>
                <button class="btn-tab" data-tf="1h" id="tf-1h">H1</button>
            </div>
        </nav>

        <main class="hero-display">
            <div class="hero-meta-row">
                <div class="adx-status ranging" id="adx-status">
                    <span>ADX</span>
                    <span class="adx-value" id="adx-value">--</span>
                    <div class="adx-bar-container"><div class="adx-bar" id="adx-bar"></div></div>
                </div>
                <div class="ema34-status" id="ema34-status">
                    <span>📊 EMA34</span>
                    <span class="ema34-value" id="ema34-value">--</span>
                </div>
                <div class="swing-high" id="swing-high-container" onclick="smartCopy('swing-high-value')">
                    <span>📈 SWING H:</span>
                    <span class="swing-high-value" id="swing-high-value">--</span>
                </div>
                <div class="swing-low" id="swing-low-container" onclick="smartCopy('swing-low-value')">
                    <span>📉 SWING L:</span>
                    <span class="swing-low-value" id="swing-low-value">--</span>
                </div>
                <div class="meta-fvg" id="fvg-status">FVG: ACTIVE</div>
                <div class="meta-bias">BIAS: <span id="pattern-val">SCANNING</span></div>
            </div>
            <div id="live-price" onclick="smartCopy('live-price')">0.00</div>
            
            <div class="rsi-panel">
                <div class="rsi-meta">
                    <div class="rsi-tag">RSI (14)</div>
                    <div id="rsi-val">---</div>
                </div>
                <div class="rsi-track"><div id="rsi-bar"></div></div>
            </div>
            
            <div class="orderblock-status" id="orderblock-status">
                🔍 ORDER BLOCK: Menghitung...
            </div>
        </main>

        <!-- DATA GRID: SL | ZONA ENTRY | TP | RANGE -->
        <section class="data-grid">
            <div class="data-item" onclick="smartCopy('rSL')">
                <span class="data-label" style="color:var(--danger)">STOP LOSS</span>
                <span class="data-val" id="rSL" style="color:var(--blue)">0.00</span>
            </div>
            <div class="data-item" onclick="smartCopy('entry-zone')">
                <span class="data-label" style="color:var(--accent)">ZONA ENTRY</span>
                <div class="data-val" id="entry-zone">
                    <span id="r618" class="entry-gold">0.00</span><br>
                    <span id="r79" class="entry-gold">0.00</span>
                </div>
            </div>
            <div class="data-item" onclick="smartCopy('rTP')">
                <span class="data-label" style="color:var(--blue)">TP (23%)</span>
                <span class="data-val" id="rTP" style="color:var(--blue)">0.00</span>
            </div>
            <div class="data-item" onclick="smartCopy('rRange')">
                <span class="data-label" style="color:var(--accent)">RANGE</span>
                <span class="data-val" id="rRange" style="color:var(--accent)">0.00</span>
            </div>
        </section>

        <section class="terminal-box">
            <div class="card">
                <div class="mtf-paragraph-card" id="mtf-paragraph" onclick="smartCopy('mtf-paragraph')">
                    <div class="mtf-paragraph-text" id="mtf-paragraph-text">
                        📊 MULTI-TIMEFRAME: 
                    </div>
                </div>
                
                <div class="footer-info" id="footer-info-module">
                    <div class="session-module-new" id="session-module-new"><span id="session-tag-new">ASIA</span></div>
                    <div class="date-module-new" id="date-display-new">--/--/--</div>
                    <div class="clock-module-new" id="clock-module-new">00:00:00</div>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    // ==================== KONFIGURASI & STATE ====================
    let currentPair = localStorage.getItem('lastPair') || "XAUUSDT";
    let currentTF = localStorage.getItem('lastTF') || "15m";
    let wsConnection = null;
    let lastPrice = 0;
    let candleData = [];
    let isReloading = false;
    let reconnectTimer = null;
    let periodicInterval = null;
    let stuckCheckInterval = null;
    let wsMessageTimeout = null;
    let isManualDisconnect = false;
    let connectionAttempts = 0;
    let lastStructureUpdateTime = 0;
    
    let engine = { 
        f618: 0, deep: 0, sl: 0, tp: 0, range: 0, bias: "SCANNING",
        swingHigh: 0, swingLow: 0,
        lastSwingHigh: 0, lastSwingLow: 0,
        sweepDetected: false, bosConfirmed: false, liquiditySide: null,
        adx: 25, ema34: 0,
        lastSweepTime: 0, lastBosTime: 0,
        lastTPHitTime: 0,
        fvgEntryActive: false
    };
    
    let mtfData = { m5: "NEUTRAL", m15: "NEUTRAL", h1: "NEUTRAL" };
    
    function getPrecision() { return currentPair === "XAUUSDT" ? 2 : 1; }
    
    // ==================== PARAMETER PER PAIR ====================
    function getSweepBuffer() {
        return currentPair === "XAUUSDT" ? 0.3 : 45;
    }
    
    function getSweepCooldown() {
        return currentPair === "XAUUSDT" ? 5000 : 6500;
    }
    
    function getFractalLookback() {
        if (currentPair === "BTCUSDT") return 4;
        if (currentTF === "5m") return 2;
        return 3;
    }
    
    // ==================== LOOKBACK PER PAIR ====================
    function getLookback() {
        if (currentPair === "BTCUSDT") {
            switch(currentTF) {
                case "5m": return 50;
                case "15m": return 80;
                case "1h": return 120;
                default: return 80;
            }
        } else {
            switch(currentTF) {
                case "5m": return 40;
                case "15m": return 55;
                case "1h": return 80;
                default: return 55;
            }
        }
    }
    
    function updateWSStatus(status, message) {
        const wsStatusDot = document.getElementById('ws-status-dot');
        const wsStatusText = document.getElementById('ws-status-text');
        const sysStatus = document.getElementById('sys-status');
        if (!wsStatusDot || !wsStatusText) return;
        
        if (status === 'live') {
            wsStatusDot.className = 'ws-status-dot live';
            wsStatusText.innerText = message || 'LIVE';
            if (sysStatus) sysStatus.style.color = 'var(--accent)';
        } else if (status === 'reconnect') {
            wsStatusDot.className = 'ws-status-dot reconnect';
            wsStatusText.innerText = message || 'RECONNECT';
            if (sysStatus) sysStatus.style.color = 'var(--orange)';
        } else if (status === 'connecting') {
            wsStatusDot.className = 'ws-status-dot reconnect';
            wsStatusText.innerText = message || 'CONNECTING';
            if (sysStatus) sysStatus.style.color = 'var(--gold)';
        } else {
            wsStatusDot.className = 'ws-status-dot offline';
            wsStatusText.innerText = message || 'OFFLINE';
            if (sysStatus) sysStatus.style.color = 'var(--danger)';
        }
    }
    
    function stopAllIntervals() {
        if (periodicInterval) { clearInterval(periodicInterval); periodicInterval = null; }
        if (stuckCheckInterval) { clearInterval(stuckCheckInterval); stuckCheckInterval = null; }
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        if (wsMessageTimeout) { clearTimeout(wsMessageTimeout); wsMessageTimeout = null; }
    }
    
    function cleanupWebSocket() {
        if (wsConnection) {
            isManualDisconnect = true;
            try {
                wsConnection.onopen = null;
                wsConnection.onmessage = null;
                wsConnection.onclose = null;
                wsConnection.onerror = null;
                if (wsConnection.readyState === WebSocket.OPEN || wsConnection.readyState === WebSocket.CONNECTING) {
                    wsConnection.close();
                }
            } catch(e) { console.warn("WS cleanup error:", e); }
            wsConnection = null;
        }
        setTimeout(() => { isManualDisconnect = false; }, 100);
    }
    
    // ==================== STRUKTUR UPDATE OTOMATIS ====================
    function checkAndUpdateStructure(currentPrice) {
        if (!candleData.length || candleData.length < 30) return;
        
        const now = Date.now();
        let structureChanged = false;
        
        if (currentPrice > engine.swingHigh && currentPrice > engine.lastSwingHigh) {
            structureChanged = true;
        }
        if (currentPrice < engine.swingLow && currentPrice < engine.lastSwingLow) {
            structureChanged = true;
        }
        
        if (engine.tp !== 0) {
            const isBullish = engine.bias === "BULLISH_BOS" || engine.bias === "BULLISH";
            if ((isBullish && currentPrice >= engine.tp) || (!isBullish && currentPrice <= engine.tp)) {
                if (now - engine.lastTPHitTime > 5000) {
                    structureChanged = true;
                    engine.lastTPHitTime = now;
                }
            }
        }
        
        if (structureChanged && (now - lastStructureUpdateTime) > 3000) {
            lastStructureUpdateTime = now;
            forceRecalculateStructure();
        }
    }
    
    // ==================== FRACTAL SWING HIGH/LOW DETECTION ====================
    function detectFractalSwingPoints(data, lookback = 5) {
        if (!data || data.length < lookback * 2 + 1) return { swingHigh: 0, swingLow: Infinity };
        
        let swingHigh = 0;
        let swingLow = Infinity;
        
        for (let i = lookback; i < data.length - lookback; i++) {
            const currentHigh = data[i].h;
            const currentLow = data[i].l;
            
            let isSwingHigh = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].h >= currentHigh) {
                    isSwingHigh = false;
                    break;
                }
            }
            
            let isSwingLow = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].l <= currentLow) {
                    isSwingLow = false;
                    break;
                }
            }
            
            if (isSwingHigh && currentHigh > swingHigh) swingHigh = currentHigh;
            if (isSwingLow && currentLow < swingLow) swingLow = currentLow;
        }
        
        if (swingHigh === 0) swingHigh = Math.max(...data.map(c => c.h));
        if (swingLow === Infinity) swingLow = Math.min(...data.map(c => c.l));
        
        return { swingHigh, swingLow };
    }
    
    // ==================== ADX Calculation ====================
    function calculateADXWithTick(currentPrice) {
        if (!candleData.length || candleData.length < 28) return 25;
        try {
            const period = 14;
            const data = [...candleData];
            if (data.length < period + 1) return 25;
            
            let tr = [], plusDM = [], minusDM = [];
            
            for (let i = 1; i < data.length; i++) {
                const high = data[i].h, low = data[i].l;
                const prevHigh = data[i-1].h, prevLow = data[i-1].l, prevClose = data[i-1].c;
                const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                tr.push(trueRange);
                
                const upMove = high - prevHigh;
                const downMove = prevLow - low;
                
                if (upMove > downMove && upMove > 0) {
                    plusDM.push(upMove);
                    minusDM.push(0);
                } else if (downMove > upMove && downMove > 0) {
                    plusDM.push(0);
                    minusDM.push(downMove);
                } else {
                    plusDM.push(0);
                    minusDM.push(0);
                }
            }
            
            const lastCandle = data[data.length - 1];
            const currentHigh = Math.max(lastCandle.h, currentPrice);
            const currentLow = Math.min(lastCandle.l, currentPrice);
            const prevClose = lastCandle.c;
            const tickTR = Math.max(currentHigh - currentLow, Math.abs(currentHigh - prevClose), Math.abs(currentLow - prevClose));
            tr.push(tickTR);
            
            const tickUpMove = currentHigh - lastCandle.h;
            const tickDownMove = lastCandle.l - currentLow;
            if (tickUpMove > tickDownMove && tickUpMove > 0) {
                plusDM.push(tickUpMove);
                minusDM.push(0);
            } else if (tickDownMove > tickUpMove && tickDownMove > 0) {
                plusDM.push(0);
                minusDM.push(tickDownMove);
            } else {
                plusDM.push(0);
                minusDM.push(0);
            }
            
            if (tr.length < period) return 25;
            
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            
            smoothedTR /= period;
            smoothedPlusDM /= period;
            smoothedMinusDM /= period;
            
            const plusDI = (smoothedPlusDM / smoothedTR) * 100;
            const minusDI = (smoothedMinusDM / smoothedTR) * 100;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            
            let adxValue = Math.min(100, Math.max(0, isNaN(dx) ? 25 : dx));
            return Math.round(adxValue * 10) / 10;
        } catch (error) { console.error("ADX Error:", error); return 25; }
    }
    
    // ==================== RSI Calculation ====================
    function computeRSI(currentPrice) {
        if (!candleData.length || candleData.length < 20) return 50;
        
        const period = 14;
        
        let closes = [];
        for (let i = 0; i < candleData.length; i++) {
            closes.push(candleData[i].c);
        }
        
        if (closes.length > 0 && currentPrice !== closes[closes.length - 1]) {
            closes.push(currentPrice);
        }
        
        if (closes.length < period + 1) return 50;
        
        let gains = [];
        let losses = [];
        
        for (let i = 1; i < closes.length; i++) {
            const diff = closes[i] - closes[i - 1];
            if (diff >= 0) {
                gains.push(diff);
                losses.push(0);
            } else {
                gains.push(0);
                losses.push(Math.abs(diff));
            }
        }
        
        let avgGain = 0;
        let avgLoss = 0;
        
        for (let i = 0; i < period; i++) {
            avgGain += gains[i];
            avgLoss += losses[i];
        }
        
        avgGain /= period;
        avgLoss /= period;
        
        for (let i = period; i < gains.length; i++) {
            avgGain = ((avgGain * (period - 1)) + gains[i]) / period;
            avgLoss = ((avgLoss * (period - 1)) + losses[i]) / period;
        }
        
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        const rsi = 100 - (100 / (1 + rs));
        
        return Math.min(100, Math.max(0, rsi));
    }
    
    // ==================== EMA34 Calculation ====================
    function calculateEMA34() {
        if (!candleData.length || candleData.length < 34) return null;
        const period = 34;
        const multiplier = 2 / (period + 1);
        let ema = candleData[0].c;
        for (let i = 1; i < candleData.length; i++) {
            ema = (candleData[i].c - ema) * multiplier + ema;
        }
        return ema;
    }
    
    function detectLiquiditySweep(price) {
        if (!engine.swingHigh || !engine.swingLow) return false;
        const buffer = getSweepBuffer();
        const cooldown = getSweepCooldown();
        const now = Date.now();
        
        if (price > engine.swingHigh + buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            engine.sweepDetected = true; engine.liquiditySide = "SELL"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return true;
        } else if (price < engine.swingLow - buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            engine.sweepDetected = true; engine.liquiditySide = "BUY"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return true;
        }
        return false;
    }

        if (!engine.sweepDetected || engine.bosConfirmed) return false;
        const now = Date.now();
        if (engine.liquiditySide === "BUY" && currentPrice > engine.swingHigh) {
            engine.bosConfirmed = true; engine.bias = "BULLISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true;

            engine.bosConfirmed = true; engine.bias = "BEARISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true;

        }
        return false;
    }

    // ==================== MAIN SMC CALCULATION ====================
    function calculateSMCLevels() {
        if (!candleData.length || candleData.length < 30) return;
        
        const lookback = getLookback();
        const fractalLookback = getFractalLookback();
        
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        const fractalPoints = detectFractalSwingPoints(slice, fractalLookback);
        
        let swingHigh = fractalPoints.swingHigh;
        let swingLow = fractalPoints.swingLow;
        
        if (swingHigh <= swingLow) {
            swingHigh = Math.max(...slice.map(c => c.h));
            swingLow = Math.min(...slice.map(c => c.l));
        }
        
        const lastCandle = candleData[candleData.length - 1];
        const currentPrice = lastCandle.c;
        const range = swingHigh - swingLow;
        
        if (range <= 0) return;
        
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        resetSweepIfStructureChanged();
        
        if (!engine.bosConfirmed) { 
            engine.bias = currentPrice > (swingHigh + swingLow) / 2 ? "BULLISH" : "BEARISH"; 
        }
        
        const isBullish = engine.bosConfirmed ? engine.bias === "BULLISH_BOS" : engine.bias === "BULLISH";
        
        if (isBullish) {
            engine.f618 = swingLow + (range * 0.618);
            engine.deep = swingLow + (range * 0.79);
            engine.tp = swingHigh + (range * 0.23);
            const distanceFromEntryToDeep = Math.abs(engine.deep - engine.f618);
            engine.sl = engine.f618 - (distanceFromEntryToDeep * 1);
        } else {
            engine.f618 = swingHigh - (range * 0.618);
            engine.deep = swingHigh - (range * 0.79);
            engine.tp = swingLow - (range * 0.23);
            const distanceFromEntryToDeep = Math.abs(engine.f618 - engine.deep);
            engine.sl = engine.f618 + (distanceFromEntryToDeep * 1);
        }
        
        updateSwingUI(); 
        updateEntryZoneUI(); 
        updateMTFAnalysis(); 
        detectOrderBlock();
    }

                updateWSStatus('reconnect', 'RECONNECT');
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    if (!isReloading && !isManualDisconnect) initWebSocket();
                }, 2000);
            }
        };
        
        wsConnection.onerror = (error) => {
            console.warn(`WebSocket error: ${currentPair}`, error);
            if (!isManualDisconnect && !isReloading) updateWSStatus('reconnect', 'ERROR');
        };
    }
    
    function startPeriodicUpdates() { 
        if (periodicInterval) clearInterval(periodicInterval); 
        periodicInterval = setInterval(() => { 
            if (lastPrice > 0 && !isReloading && candleData.length > 0) { 
                calculateSMCLevels(); 
                updateUI(lastPrice); 
            } 
        }, 1000); 
    }
    
    function startStuckChecker() { 
        if (stuckCheckInterval) clearInterval(stuckCheckInterval); 
        stuckCheckInterval = setInterval(() => { 
            if (wsConnection && wsConnection.readyState !== WebSocket.OPEN && !isReloading && !isManualDisconnect) {
                updateWSStatus('reconnect', 'RECONNECT');
            }
        }, 5000); 
    }
    
    window.smartCopy = function(id) {
        let textToCopy = "";
        if (id === 'mtf-paragraph') { 
            const mtfElem = document.getElementById('mtf-paragraph-text'); 
            if (mtfElem) textToCopy = mtfElem.innerText; 
        }
        else if (id === 'entry-zone') {
            const r618 = document.getElementById('r618');
            const r79 = document.getElementById('r79');
            if (r618 && r79) textToCopy = `Entry 0.618: ${r618.innerText} | Entry 0.79: ${r79.innerText}`;
        }
        else if (id === 'swing-high-value') {
            const swingHighVal = document.getElementById('swing-high-value');
            if (swingHighVal) textToCopy = `Swing High: ${swingHighVal.innerText}`;
        }
        else if (id === 'swing-low-value') {
            const swingLowVal = document.getElementById('swing-low-value');
            if (swingLowVal) textToCopy = `Swing Low: ${swingLowVal.innerText}`;
        }
        else { 
            const el = document.getElementById(id); 
            if (el) textToCopy = el.innerText; 
        }
        if (!textToCopy) return;
        navigator.clipboard.writeText(textToCopy);
        const targetElem = document.getElementById(id);
        if (targetElem) { 
            targetElem.classList.add('copied'); 
            setTimeout(() => targetElem.classList.remove('copied'), 300); 
        }
    };
    
    function updateClockAndSession() {
        const now = new Date(); 
        const hours = now.getHours();
        const clockElem = document.getElementById('clock-module-new');
        const dateElem = document.getElementById('date-display-new');
        const sessionElem = document.getElementById('session-tag-new');
        if (clockElem) clockElem.innerText = now.toLocaleTimeString('id-ID');
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = String(now.getFullYear()).slice(-2);
        if (dateElem) dateElem.innerText = `${day}/${month}/${year}`;
        let session = "NY_VOL"; 
        if (hours >= 7 && hours < 14) session = "ASIA"; 
        else if (hours >= 14 && hours < 20) session = "LONDON";
        if (sessionElem) sessionElem.innerText = session;
    }
    
    function disableButtons(disabled) {
        document.querySelectorAll('.btn-tab').forEach(btn => {
            if (disabled) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });
    }
    
    async function fullReload() {
        if (isReloading) return;
        isReloading = true;
        disableButtons(true);
        document.getElementById('main-terminal')?.classList.add('syncing');
        
        stopAllIntervals();
        cleanupWebSocket();
        
        engine.sweepDetected = false; 
        engine.bosConfirmed = false; 
        engine.liquiditySide = null; 
        engine.fvgEntryActive = false;
        updateEntryZoneUI();
        updateWSStatus('connecting', 'LOADING');
        
        await fetchKlines();
        
        initWebSocket();
        startPeriodicUpdates();
        startStuckChecker();
        
        document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
        const pairBtn = document.getElementById(`btn-${currentPair}`);
        const tfBtn = document.getElementById(`tf-${currentTF}`);
        if (pairBtn) pairBtn.classList.add('active');
        if (tfBtn) tfBtn.classList.add('active');
        
        setTimeout(() => {
            document.getElementById('main-terminal')?.classList.remove('syncing');
            disableButtons(false);
            isReloading = false;
        }, 500);
    }
    
    document.querySelectorAll('[data-pair]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentPair === btn.dataset.pair || isReloading) return; 
            currentPair = btn.dataset.pair; 
            localStorage.setItem('lastPair', currentPair); 
            fullReload(); 
        }; 
    });
    
    document.querySelectorAll('[data-tf]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentTF === btn.dataset.tf || isReloading) return; 
            currentTF = btn.dataset.tf; 
            localStorage.setItem('lastTF', currentTF); 
            fullReload(); 
        }; 
    });
    
    setInterval(updateClockAndSession, 1000);
    fullReload();
</script>
</body>
</html>
